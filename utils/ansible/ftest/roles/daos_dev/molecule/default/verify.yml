- hosts: all
  gather_facts: false
  tasks:
    - name: Verify tasks completed without error
      debug:
        msg: "daos_dev users_groups tasks verified"

    - name: Verify fake repo was not enabled
      become: true
      command: dnf repolist
      register: _repo_verify
      changed_when: false
      failed_when: "'fake-repo-does-not-exist' in _repo_verify.stdout"

    - name: Verify build requirements installed system-wide via python3.11
      become: true
      command: python3.11 -c "import distro"
      changed_when: false

    - name: Verify unit-test requirements installed system-wide via python3.11
      become: true
      command: python3.11 -c "import distro"
      changed_when: false

    # ── Proxy rendering verification ──────────────────────────────────────────

    - name: Read rendered daos-make.sh (proxy case)
      slurp:
        src: /opt/daos/daos-make-proxy.sh
      register: _daos_make_proxy

    - name: Set fact for proxy script content
      set_fact:
        _proxy_script: "{{ _daos_make_proxy.content | b64decode }}"

    - name: Verify http_proxy is exported when daos_http_proxy is set
      assert:
        that:
          - "'export http_proxy=\"http://test-proxy.example.com:3128\"' in _proxy_script"
          - "'export HTTP_PROXY=\"http://test-proxy.example.com:3128\"' in _proxy_script"
          - "'export https_proxy=\"http://test-proxy.example.com:3128\"' in _proxy_script"
          - "'export HTTPS_PROXY=\"http://test-proxy.example.com:3128\"' in _proxy_script"
        fail_msg: "Proxy URL not found in rendered daos-make.sh (proxy case)"

    - name: Verify no_proxy is exported alongside http_proxy
      assert:
        that:
          - "'export no_proxy=\"localhost,127.0.0.1\"' in _proxy_script"
          - "'export NO_PROXY=\"localhost,127.0.0.1\"' in _proxy_script"
        fail_msg: "no_proxy / NO_PROXY not found in rendered daos-make.sh (proxy case)"

    - name: Verify GOPROXY is set to the configured value when proxy is active
      assert:
        that:
          - "'export GOPROXY=\"http://goproxy.example.com\"' in _proxy_script"
        fail_msg: "GOPROXY not found in rendered daos-make.sh (proxy case)"

    - name: Read rendered daos-make.sh (no-proxy case)
      slurp:
        src: /opt/daos/daos-make-noproxy.sh
      register: _daos_make_noproxy

    - name: Set fact for no-proxy script content
      set_fact:
        _noproxy_script: "{{ _daos_make_noproxy.content | b64decode }}"

    - name: Verify proxy exports are absent when daos_http_proxy is empty
      assert:
        that:
          - "'export http_proxy' not in _noproxy_script"
          - "'export HTTP_PROXY' not in _noproxy_script"
          - "'export no_proxy' not in _noproxy_script"
        fail_msg: "Proxy exports should be absent in no-proxy rendering of daos-make.sh"

    - name: Verify GOPROXY is always set even without a proxy
      assert:
        that:
          - "'export GOPROXY=\"direct\"' in _noproxy_script"
        fail_msg: "GOPROXY must always be set in daos-make.sh even when no proxy is configured"

    # ── Provenance script verification ────────────────────────────────────────

    - name: Read rendered daos-deploy-info.sh
      slurp:
        src: /opt/daos/daos-deploy-info.sh
      register: _deploy_info

    - name: Set fact for deploy info script content
      set_fact:
        _deploy_info_content: "{{ _deploy_info.content | b64decode }}"

    - name: Verify DAOS_GENERATED is baked into the provenance script
      assert:
        that: "'DAOS_GENERATED=\"2024-01-15T10:30:00Z\"' in _deploy_info_content"
        fail_msg: "DAOS_GENERATED not found in rendered daos-deploy-info.sh"

    - name: Verify DAOS_CONTROLLER_HOST is baked into the provenance script
      assert:
        that: "'DAOS_CONTROLLER_HOST=\"test-ctrl.example.com\"' in _deploy_info_content"
        fail_msg: "DAOS_CONTROLLER_HOST not found in rendered daos-deploy-info.sh"

    - name: Verify DAOS_INVENTORY is baked into the provenance script
      assert:
        that: "'DAOS_INVENTORY=\"/home/testuser/test-inventory.yml\"' in _deploy_info_content"
        fail_msg: "DAOS_INVENTORY not found in rendered daos-deploy-info.sh"

    - name: Verify DAOS_INVENTORY_COPY path is inside daos_runtime_dir
      assert:
        that: "'DAOS_INVENTORY_COPY=\"/opt/daos/inventory.yml\"' in _deploy_info_content"
        fail_msg: "DAOS_INVENTORY_COPY not pointing to /opt/daos/inventory.yml"

    - name: Verify DAOS_SERVER_NODES is set (molecule host is in daos_servers group)
      assert:
        that: "'DAOS_SERVER_NODES=' in _deploy_info_content"
        fail_msg: "DAOS_SERVER_NODES not found in rendered daos-deploy-info.sh"

    - name: Verify DAOS_CLIENT_NODES is empty string (no clients in molecule scenario)
      assert:
        that: "'DAOS_CLIENT_NODES=\"\"' in _deploy_info_content"
        fail_msg: "DAOS_CLIENT_NODES should be empty string (no daos_clients group in molecule)"

    - name: Verify BASH_SOURCE guard is present in provenance script
      assert:
        that: "'BASH_SOURCE[0]' in _deploy_info_content"
        fail_msg: "BASH_SOURCE guard not found — provenance script must be sourceable"
