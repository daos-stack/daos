# yamllint disable rule:line-length
- name: Configure dnf to skip unavailable repositories
  become: true
  community.general.ini_file:
    path: /etc/dnf/dnf.conf
    section: main
    option: skip_if_unavailable
    value: 'True'

- name: Install base OS dependency packages
  become: true
  dnf:
    state: present
    update_cache: true
    name: "{{ daos_base_deps.rpms }}"
