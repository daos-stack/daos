# yamllint disable rule:line-length
# Ansible playbook for deploying the DAOS functional test platform

- hosts: all
  vars_files:
    - vars/defaults.yml
  environment: "{{ daos_proxy_env }}"
  roles:
    - daos_common

- hosts: daos_dev
  vars_files:
    - vars/defaults.yml
  environment: "{{ daos_proxy_env }}"
  roles:
    - daos_client
    - daos_dev

- hosts: daos_servers
  vars_files:
    - vars/defaults.yml
  environment: "{{ daos_proxy_env }}"
  roles:
    - daos_server

- hosts: daos_clients
  vars_files:
    - vars/defaults.yml
  environment: "{{ daos_proxy_env }}"
  roles:
    - daos_client

- hosts: all
  vars_files:
    - vars/defaults.yml
  environment: "{{ daos_proxy_env }}"
  roles:
    - daos_post
