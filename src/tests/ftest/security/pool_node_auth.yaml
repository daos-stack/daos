hosts:
  test_servers: 3
  test_clients: 1
timeout: 1200
server_config:
  name: daos_server
  port: 10001
  engines_per_host: 1
  engines:
    0:
      targets: 4
      nr_xs_helpers: 0
      storage:
        0:
          class: ram
          scm_mount: /mnt/daos
          scm_size: 4
  system_ram_reserved: 1
pool:
  scm_size: 134217728
  svc_redun_fac: 1
  transport_config:
    allow_insecure: False
agent_config:
  transport_config:
    allow_insecure: False
dmg:
  transport_config:
    allow_insecure: False
container:
  control_method: daos
