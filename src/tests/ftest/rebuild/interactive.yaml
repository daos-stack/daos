hosts:
  test_servers: 7
  test_clients: 1

timeout: 600

server_config:
  name: daos_server
  crt_timeout: 10
  engines_per_host: 1
  engines:
    0:
      targets: 2
      nr_xs_helpers: 0
      log_mask: DEBUG,MEM=ERR
      env_vars:
        - DD_MASK=mgmt,md,rebuild
      storage:
        0:
          class: ram
          scm_mount: /mnt/daos
  system_ram_reserved: 1

pool:
  size: 40G
  pool_query_timeout: 30
  properties: rd_fac:3

cont_ior:
  type: POSIX
  properties: rd_fac:3
  oclass: RP_4GX  # TODO

ior:
  ppn: 16
  test_file: /testFile
  api: DFS
  transfer_size: 1M
  block_size: 128M
  flags_write: "-v -w -k -G 1"
  flags_read: "-v -r -R -k -G 1"
