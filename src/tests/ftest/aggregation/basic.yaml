hosts:
  test_servers: 2
  test_clients: 2
timeout: 540
server_config:
  system_ram_reserved: 16
  name: daos_server
  engines_per_host: 1
  engines:
    0:
      log_mask: INFO
      storage: auto
pool:
  scm_size: 50000000000
  nvme_size: 500000000000
  properties: rd_fac:0
container:
  type: POSIX
ior:
  env_vars:
    - D_LOG_MASK=INFO
  client_processes:
    ppn: 6
  test_file: daos:/testFile
  flags: "-v -w -W -r -R -k"
  api: DFS
  transfer_size: '1M'
  block_size: '8G'
  objectclass: !mux
    oclass_SX:
      dfs_oclass: "SX"
    oclass_RP_2GX:
      dfs_oclass: "RP_2GX"
