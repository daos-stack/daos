hosts:
  test_servers: 1

timeout: 300

server_config:
  name: daos_server
  engines_per_host: 2
  disable_engine_auto_restart: true  # Disable automatic engine restart
  engines:
    0:
      log_file: daos_server0.log
      targets: 4
      nr_xs_helpers: 0
      storage:
        0:
          class: ram
          scm_mount: /mnt/daos0
    1:
      log_file: daos_server1.log
      targets: 4
      nr_xs_helpers: 0
      storage:
        0:
          class: ram
          scm_mount: /mnt/daos1

pool:
  size: 8G
