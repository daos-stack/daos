hosts:
  test_servers: 3
  test_clients: 1

# Hard limit the test at ten hours, however individual tests have lower timeouts, if the timeout
# in the test is hit then the test itself will perform some diagnostics so it's preferable
# to fail there rather than here.
timeout: 36000

server_config:
  name: daos_server
  crt_timeout: 120
  engines_per_host: 2
  engines:
    0:
      pinned_numa_node: 0
      nr_xs_helpers: 1
      log_file: daos_server0.log
      storage: auto
      targets: 4
    1:
      pinned_numa_node: 1
      nr_xs_helpers: 1
      log_file: daos_server1.log
      storage: auto
      targets: 4

pool:
  size: 90%

container:
  type: POSIX
  control_method: daos

dfuse:
  cores: '0-17'
  thread_count: 36
  enable_local_flock: true

dfuse_il:
  enable_local_flock: true
