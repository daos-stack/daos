syntax = "proto3";
package auth;

option go_package = "github.com/daos-stack/daos/src/control/security/auth;auth";

// Types of authentication token
enum Flavor {
	AUTH_NONE = 0;
	AUTH_SYS = 1;
}

message Token {
	Flavor flavor = 1; // flavor of this authentication token
	bytes data = 2; // packed structure of the specified flavor
}

// Token structure for AUTH_SYS flavor cred
message Sys {
	uint64 stamp = 1; // timestamp
	string machinename = 2; // machine name
	string user = 3; // user name
	string group = 4; // primary group name
	repeated string groups = 5; // secondary group names
	string secctx = 6; // Additional field for MAC label
}

// Token and verifier are expected to have the same flavor type.
message Credential {
	Token token = 1; // authentication token
	Token verifier = 2; // to verify integrity of the token
	string origin = 3; // the agent that created this credential
}

// GetCredReq represents a request to fetch authentication credentials.
//
// Valid call shapes:
//   - legacy: both fields empty (AUTH_SYS credential only, no PoP).
//   - pool-scoped with PoP: pool_id set to the target pool UUID string
//     and handle_uuid set to the 16-byte pool handle UUID the caller is
//     about to open; the agent returns a PoP-signed bundle in the
//     response.
message GetCredReq {
	string pool_id = 1;    // Pool UUID string (RFC-4122; empty for legacy/non-pool ops)
	bytes handle_uuid = 2; // Pool handle UUID (16 bytes, for PoP binding)
}

// GetCredResp represents the result of a request to fetch authentication
// credentials.
message GetCredResp {
	int32 status = 1; // Status of the request
	Credential cred = 2; // Caller's authentication credential
	bytes node_cert = 3;         // PEM-encoded node certificate (empty if none)
	bytes node_cert_pop = 4;     // PoP signature bytes (empty if none)
	bytes node_cert_payload = 5; // Signed PoP payload; see ValidateNodeCertReq for layout
}

// ValidateCredReq represents a request to verify a set of authentication
// credentials.
message ValidateCredReq {
	Credential cred = 1; // Credential to be validated
}

// ValidateCredResp represents the result of a request to validate
// authentication credentials.
message ValidateCredResp {
	int32 status = 1; // Status of the request
	Token token = 2; // Validated authentication token from the credential
}

// ValidateNodeCertReq represents a request to validate a node certificate
// and proof-of-possession for per-pool node authentication.
message ValidateNodeCertReq {
	bytes  pool_ca   = 1; // Concatenated PEM bundle of one or more pool intermediate CA certs
	bytes  node_cert = 2; // PEM node certificate
	bytes  node_cert_pop     = 3; // PoP signature
	bytes  node_cert_payload = 4; // Signed PoP payload, 40 bytes: pool_uuid(16) ||
				      // handle_uuid(16) || timestamp(8, big-endian seconds)
	string pool_id      = 5;      // Pool UUID string (RFC-4122)
	string machine_name = 6;      // Credential machine name for CN cross-validation
	bytes  cert_watermarks =
	    7; // Per-CN revocation watermarks, JSON blob: {"<cn>": "<rfc3339>"}. A cert whose
	       // NotBefore is strictly less than the watermark for its CN is rejected.
}

// ValidateNodeCertResp represents the result of a node certificate
// validation request.
message ValidateNodeCertResp {
	int32 status = 1;  // Status of the validation
	string detail = 2; // Human-readable failure detail (empty on success)
}
