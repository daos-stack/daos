// This file defines check engine-related messages.

syntax = "proto3";
package ctl;

option  go_package = "github.com/daos-stack/daos/src/control/common/proto/ctl";

import "mgmt/check.proto";

// Send an action request to a specific check engine.
message CheckEngineActReq
{
	uint32           rank = 1;
	mgmt.CheckActReq req  = 2;
}

message CheckEngineActResp
{
	uint32            rank = 1;
	mgmt.CheckActResp resp = 2;
}
